name: Yaru 1.0 Input Validation Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-and-generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Matrix
      uses: actions/checkout@v4

    - name: Configure Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Mount Infrastructure Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute View Gatekeeper Engine
      run: |
        python core/view_gatekeeper.py

    - name: Execute 3D Mesh Generator Engine
      run: |
        python core/mesh_generator.py

    - name: Execute Export Environmental Bridge
      run: |
        python adapters/execution_bridge.py

    - name: Archive Validated 3D Models and Inference Package
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: yaru-final-3d-asset-bundle
        path: |
          output_models/
          telemetry/
        retention-days: 5
        
